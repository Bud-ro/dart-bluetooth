name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.0"
  PKG: packages/bluetooth_rfcomm # pure-Dart core (publishable to pub.dev)
  PKGF: packages/bluetooth_rfcomm_flutter # Flutter plugin (native builds)
  EXAMPLE: packages/bluetooth_rfcomm_flutter/example # Flutter demo app
  PKG_LE: packages/bluetooth_le # BLE pure-Dart core (in development)
  PKG_LE_F: packages/bluetooth_le_flutter # BLE Flutter plugin (Android native)
  EXAMPLE_LE: packages/bluetooth_le_flutter/example # BLE Flutter demo app

jobs:
  # Pure-Dart core: analyze + unit tests on every desktop OS, then build and
  # *run* the CLI's `doctor` command. `dart build cli` drives the native-assets
  # build hook (compiling the IOBluetooth wrapper on macOS); running the built
  # binary then loads that library and resolves its FFI symbols — so a dylib/DLL
  # load or code-signing error fails CI even with no Bluetooth hardware.
  analyze-test:
    timeout-minutes: 20
    name: dart (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: dart --version

      - name: pub get
        working-directory: ${{ env.PKG }}
        run: dart pub get

      - name: format check
        if: matrix.os == 'ubuntu-latest'
        working-directory: ${{ env.PKG }}
        run: dart format --output=none --set-exit-if-changed lib test

      - name: analyze (lib + test)
        working-directory: ${{ env.PKG }}
        run: dart analyze lib test

      - name: test
        working-directory: ${{ env.PKG }}
        run: dart test

      - name: publish dry-run (pure-Dart package is pub.dev-publishable)
        if: matrix.os == 'ubuntu-latest'
        working-directory: ${{ env.PKG }}
        run: dart pub publish --dry-run

      - name: build CLI example (drives the native-assets build hook)
        working-directory: ${{ env.PKG }}/example
        run: |
          dart pub get
          dart analyze
          dart build cli

      - name: launch smoke — run the built CLI doctor (loads native backend)
        working-directory: ${{ env.PKG }}/example
        shell: bash
        run: |
          BIN=$(find build/cli -type f -name 'btc*' ! -name '*.dll' | head -1)
          echo "running: $BIN doctor"
          "$BIN" doctor

  # BLE pure-Dart core: analyze + unit tests on every desktop OS. On macOS,
  # `dart test` runs the native-assets build hook, which compiles + links the
  # CoreBluetooth wrapper — so a native compile/link error fails CI here even
  # before the BLE backends are fully wired.
  analyze-test-le:
    timeout-minutes: 20
    name: dart ble (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: pub get
        working-directory: ${{ env.PKG_LE }}
        run: dart pub get
      - name: format check
        if: matrix.os == 'ubuntu-latest'
        working-directory: ${{ env.PKG_LE }}
        run: dart format --output=none --set-exit-if-changed lib test
      - name: analyze
        working-directory: ${{ env.PKG_LE }}
        run: dart analyze lib test
      - name: test (macOS also compiles the CoreBluetooth wrapper via the hook)
        working-directory: ${{ env.PKG_LE }}
        run: dart test

  # Flutter plugin package: analyze the plugin + its example.
  flutter-package:
    timeout-minutes: 20
    name: flutter package (analyze)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: analyze plugin
        working-directory: ${{ env.PKGF }}
        run: |
          flutter pub get
          dart format --output=none --set-exit-if-changed .
          flutter analyze
      - name: analyze example
        working-directory: ${{ env.EXAMPLE }}
        run: |
          flutter pub get
          dart format --output=none --set-exit-if-changed .
          flutter analyze

  # Flutter Android: compile (apk) + a runtime launch smoke on an emulator,
  # which loads libbluetooth_rfcomm_android.so and exercises the JNI shim
  # (JNI_GetCreatedJavaVMs + RegisterNatives) — the riskiest loading path. The
  # native .so comes from the bluetooth_rfcomm_flutter plugin's CMake build.
  build-android:
    timeout-minutes: 30
    name: flutter android (build + emulator launch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: enable native assets
        run: flutter config --enable-native-assets
      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: generate runners + build apk
        working-directory: ${{ env.EXAMPLE }}
        run: |
          flutter create --platforms=android --org lol.carson .
          flutter pub get
          flutter build apk --debug
      # Cache a booted-emulator snapshot so the launch step restores in seconds
      # instead of cold-booting (the cold boot is what intermittently times out).
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-x86_64-default
      - name: create AVD snapshot (on cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          emulator-boot-timeout: 900
          script: echo "AVD snapshot created."
      - name: launch smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          emulator-boot-timeout: 900
          working-directory: ${{ env.EXAMPLE }}
          script: flutter test integration_test/app_launch_test.dart -d emulator-5554

  # BLE Flutter plugin package: analyze the plugin + its example.
  flutter-package-le:
    timeout-minutes: 20
    name: flutter package le (analyze)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: analyze plugin
        working-directory: ${{ env.PKG_LE_F }}
        run: |
          flutter pub get
          dart format --output=none --set-exit-if-changed .
          flutter analyze
      - name: analyze example
        working-directory: ${{ env.EXAMPLE_LE }}
        run: |
          flutter pub get
          dart format --output=none --set-exit-if-changed .
          flutter analyze

  # BLE Flutter Android: compile (apk) + a runtime launch smoke on an emulator,
  # which loads libbluetooth_le_android.so and exercises the JNI shim
  # (JNI_GetCreatedJavaVMs + RegisterNatives). The native .so is built by the
  # bluetooth_le_flutter plugin's CMake/Kotlin build.
  build-android-le:
    timeout-minutes: 30
    name: flutter android le (build + emulator launch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: enable native assets
        run: flutter config --enable-native-assets
      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: generate runners + build apk
        working-directory: ${{ env.EXAMPLE_LE }}
        run: |
          flutter create --platforms=android --org lol.carson .
          flutter pub get
          flutter build apk --debug
      # Cache a booted-emulator snapshot so the launch step restores in seconds
      # instead of cold-booting (the cold boot is what intermittently times out).
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-x86_64-default
      - name: create AVD snapshot (on cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          emulator-boot-timeout: 900
          script: echo "AVD snapshot created."
      - name: launch smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          emulator-boot-timeout: 900
          working-directory: ${{ env.EXAMPLE_LE }}
          script: flutter test integration_test/app_launch_test.dart -d emulator-5554

  # Flutter Linux: build + headless launch smoke (xvfb) — loads the D-Bus backend.
  build-linux:
    timeout-minutes: 20
    name: flutter linux (build + launch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libdbus-1-dev xvfb
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: enable native assets
        run: flutter config --enable-native-assets
      - name: generate runners + build
        working-directory: ${{ env.EXAMPLE }}
        run: |
          flutter create --platforms=linux --org lol.carson .
          flutter pub get
          flutter build linux --debug
      - name: launch smoke (xvfb)
        working-directory: ${{ env.EXAMPLE }}
        run: xvfb-run -a flutter test integration_test/app_launch_test.dart -d linux

  # Flutter Apple: macOS gets a build + launch smoke (loads the IOBluetooth
  # dylib at runtime); iOS is build-only. Apple native code is compiled by the
  # bluetooth_rfcomm native-assets hook (NOT SPM) — this job is what validates
  # that Flutter builds those code assets for Apple targets.
  build-apple:
    timeout-minutes: 30
    name: flutter apple (build + launch)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: enable native assets
        run: flutter config --enable-native-assets

      - name: build + launch macOS
        working-directory: ${{ env.EXAMPLE }}
        run: |
          flutter create --platforms=macos --org lol.carson .
          flutter pub get
          flutter build macos --debug
          flutter test integration_test/app_launch_test.dart -d macos

      # iOS: build only. Validates the ExternalAccessory native code compiles and
      # links as a code asset. A simulator *launch* smoke was intentionally
      # dropped — slow/flaky on macOS runners, and iOS for a non-MFi device is
      # unusable anyway (BLE is the path).
      - name: build iOS (no codesign)
        working-directory: ${{ env.EXAMPLE }}
        run: |
          flutter create --platforms=ios --org lol.carson .
          flutter pub get
          flutter build ios --debug --no-codesign

  # Flutter Windows: build only. The Windows backend is pure FFI to system DLLs
  # (ws2_32) — there's no custom native library that could fail to load, and the
  # FFI load path is already exercised at runtime by the `dart (windows-latest)`
  # job's CLI `doctor`. A Flutter launch smoke adds no coverage and `flutter test
  # integration_test` mis-reports results on Windows desktop (runs the test but
  # reports "No tests were found" / exit 1), so it's intentionally dropped.
  build-windows:
    timeout-minutes: 25
    name: flutter windows (build)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: generate runners + build
        working-directory: ${{ env.EXAMPLE }}
        run: |
          flutter create --platforms=windows --org lol.carson .
          flutter pub get
          flutter build windows --debug

  # BLE Flutter Apple: macOS build + launch smoke (loads the CoreBluetooth code
  # asset built by bluetooth_le's native-assets hook); iOS build-only. This is
  # what validates Flutter builds the BLE Apple code asset for both targets.
  build-apple-le:
    timeout-minutes: 30
    name: flutter apple le (build + launch)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: enable native assets
        run: flutter config --enable-native-assets
      - name: build + launch macOS
        working-directory: ${{ env.EXAMPLE_LE }}
        run: |
          flutter create --platforms=macos --org lol.carson .
          flutter pub get
          flutter build macos --debug
          flutter test integration_test/app_launch_test.dart -d macos
      - name: build iOS (no codesign)
        working-directory: ${{ env.EXAMPLE_LE }}
        run: |
          flutter create --platforms=ios --org lol.carson .
          flutter pub get
          flutter build ios --debug --no-codesign

  # BLE Flutter Linux: build + headless launch smoke (xvfb) — loads the BlueZ
  # D-Bus backend.
  build-linux-le:
    timeout-minutes: 20
    name: flutter linux le (build + launch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libdbus-1-dev xvfb
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: enable native assets
        run: flutter config --enable-native-assets
      - name: generate runners + build
        working-directory: ${{ env.EXAMPLE_LE }}
        run: |
          flutter create --platforms=linux --org lol.carson .
          flutter pub get
          flutter build linux --debug
      - name: launch smoke (xvfb)
        working-directory: ${{ env.EXAMPLE_LE }}
        run: xvfb-run -a flutter test integration_test/app_launch_test.dart -d linux

  # BLE Flutter Windows: build only. The Windows backend is pure FFI to system
  # DLLs; the FFI struct ABI is pinned by the windows_ffi byte-layout tests in the
  # `dart ble (windows-latest)` job. `flutter test integration_test` mis-reports
  # on Windows desktop, so a launch smoke is intentionally dropped.
  build-windows-le:
    timeout-minutes: 25
    name: flutter windows le (build)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: generate runners + build
        working-directory: ${{ env.EXAMPLE_LE }}
        run: |
          flutter create --platforms=windows --org lol.carson .
          flutter pub get
          flutter build windows --debug
