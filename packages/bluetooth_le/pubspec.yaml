name: bluetooth_le
description: >-
  Cross-platform Bluetooth Low Energy (GATT) for Dart and Flutter, with a
  GATT-as-serial channel. Pure-Dart CLI plus Flutter on macOS, Linux, Android,
  iOS, and Windows.
version: 0.1.0
repository: https://github.com/Bud-ro/dart-bluetooth
homepage: https://github.com/Bud-ro/dart-bluetooth/tree/master/packages/bluetooth_le
documentation: https://github.com/Bud-ro/dart-bluetooth/blob/master/packages/bluetooth_le/README.md
issue_tracker: https://github.com/Bud-ro/dart-bluetooth/issues
topics:
  - bluetooth
  - ble
  - gatt
  - ffi

# Pure-Dart, Flutter-free core (publishable). Windows (Win32 GATT FFI), Linux
# (BlueZ/D-Bus) and macOS (CoreBluetooth via the native-assets hook) work from a
# CLI and Flutter desktop; iOS and Android get their native builds from the
# companion bluetooth_le_flutter plugin. No objective_c/jni (they pull in
# Flutter); native interop is a hand-written C ABI over dart:ffi + NativeCallable.
environment:
  sdk: ^3.10.0

dependencies:
  ffi: ^2.1.0
  dbus: ^0.7.10
  logging: ^1.2.0
  meta: ^1.16.0
  hooks: ^2.0.0
  code_assets: ^1.2.0
  native_toolchain_c: ^0.19.1

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
  ffigen: ^20.0.0
